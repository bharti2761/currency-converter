<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style=" background-color: #d9e0cc">
    
    <div class="container-wrapper mx-3">
        <div class="container-box p-4 shadow">
            <h1>Currency Converter</h1>
            
            <form>
                <div class="mb-3 text-start px-4">
                    <label class="form-label fw-medium mb-1">Enter Amount:</label>
                    <input name="amt" type="text" id="amount" class="form-control-custom w-100" value="1"/>
                </div>
                
                <hr class="mx-auto" />
                
                <div class="row align-items-center justify-content-center g-3 px-2">
                    
                    <div class="col-12 col-sm-5 text-center text-sm-start">
                        <p class="mb-1 fw-medium">From:</p>
                        <div class="select-container from d-flex align-items-center justify-content-center p-1">
                            <img src="https://flagsapi.com/US/flat/64.png" alt="From Flag"/>
                            <select name="from" class="select border-0 bg-transparent text-center">
                                <option value="USD">USD</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="col-12 col-sm-2 text-center icon-container my-2 my-sm-0">
                        <i class="fa-solid fa-arrow-right-arrow-left fs-4"></i>
                    </div>
                    
                    <div class="col-12 col-sm-5 text-center text-sm-start">
                        <p class="mb-1 fw-medium">To:</p>
                        <div class="select-container d-flex align-items-center justify-content-center p-1">
                            <img src="https://flagsapi.com/IN/flat/64.png" alt="To Flag"/>
                            <select name="to" class="select border-0 bg-transparent text-center">
                                <option value="INR">INR</option>
                            </select>
                        </div>
                    </div>
                    
                </div>
            </form>
            
            <div class="px-2">
                <hr class="mx-auto"/>
                <p class="msg my-3">1 USD = 83.50 INR</p>
                <button id="btn" class="btn btn-block w-100 py-2 fw-semibold">Get Exchange Rate</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    </body>
</html>
